name: "Create or Update Config file To GCS"
description: "Upload or update if not already exist the repository configuration file in GCS bucket."

inputs:
  SERVICE:
    description: "Cloud Run service name"
    required: true
  CONFIG_PATH:
    description: "Relative path of the config file in the repository"
    required: false
    default: "./"

runs:
  using: "composite"
  steps:
    # Checkout repository
    - name: Check out the repository
      uses: actions/checkout@v4

    # Authenticate with Google Cloud
    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ env.secrets }}

    # Set up Google Cloud SDK
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ env.PROJECT_ID }}

    # Upload or update the configuration file in GCS
    - name: Upload config file to GCS
      id: upload_config
      env:
        PROJECT_ID: ${{ env.PROJECT_ID }}
        CONFIG_PATH: ${{ inputs.CONFIG_PATH }}
        SERVICE: ${{ inputs.SERVICE }}
      shell: bash
      run: |
        set -e
        
        # Build the bucket name using a compact project ID (remove '-')
        bucket_name="config_cloudrun_$(echo "$PROJECT_ID" | tr -d '-')"
        echo "Target bucket name: $bucket_name"
        
        # Build local config file path (replace '-' with underscore)
        local_config_path=$(echo "$SERVICE" | sed 's/-/_/g')_config.json
        blob_name=$(echo "$SERVICE" | sed 's/-/_/g')_config.json
        echo "Blob name: $blob_name"

        echo "Uploading configuration for service '$SERVICE'..."
        
        # Check if the related config file exists
        if [ ! -f "$local_config_path" ]; then
          echo "❌ Config file not found: $local_config_path"
        fi
        
        # Check if the GCS bucket exists
        if ! gsutil ls -b "gs://$bucket_name" >/dev/null 2>&1; then
          echo "❌ Bucket does not exist. Config file not uploaded/updated."
          exit 1
        fi
        
        # Check if the blob already exists in the bucket
        if gsutil -q stat "gs://$bucket_name/$blob_name"; then
          echo "Config file already exists. Proceeding with update."
        else
          echo "Config file does not exist. Proceeding with upload."
        fi

        # Upload or overwrite the config file in GCS
        gsutil cp "$local_config_path" "gs://$bucket_name/$blob_name"
        echo "Config file uploaded/updated successfully in gs://$bucket_name/$blob_name"
