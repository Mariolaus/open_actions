name: "Create or Update Config file To GCS"
description: "Upload or update the configuration file to the corresponding GCS bucket file"

inputs:
  PROJECT_ID:
    description: "GCloud project ID"
    required: true
  SERVICE:
    description: "Cloud Run service name"
    required: true
  REGION:
    description: "GCloud region"
    required: true
    default: "europe-west8"
  secrets:
    description: "GCP service account key (JSON)"
    required: true
  CONFIG_PATH:
    description: "Relative path of the config file in the repository"
    required: false
    default: "config"

runs:
  using: "composite"
  steps:
    # Checkout repository
    - name: Check out the repository
      uses: actions/checkout@v4

    # Authenticate with Google Cloud
    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ inputs.secrets }}

    # Set up Google Cloud SDK
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ inputs.PROJECT_ID }}

    # Upload or update the config file in GCS
    - name: Upload config file to GCS
      id: upload_config
      shell: bash
      run: |
        set -e

        # Bucket name convention: config_cloudrun_{compact_projectid}
        echo "PROJECT_ID: '${{ inputs.PROJECT_ID }}'"
        bucket_name="config_cloudrun_$(echo "${{ inputs.PROJECT_ID }}" | tr -d '-')"
        echo "Target bucket name: $bucket_name"

        # Local path to config file
        local_config_path="${{ inputs.CONFIG_PATH }}/${{ inputs.SERVICE }}_config.json"

        # Remote blob name
        remote_blob_name="$(echo "${{ inputs.SERVICE }}" | sed 's/-/_/g')_config.json"
        echo "Blob name: $remote_blob_name"
        
        echo "Uploading configuration for service '${{ inputs.SERVICE }}'..."

        if [ ! -f "$local_config_path" ]; then
          echo "❌ Config file not found: $local_config_path"
          exit 1
        fi

        # Check if bucket exists
        if ! gsutil ls -b "gs://$bucket_name" >/dev/null 2>&1; then
          echo "Bucket does not exist. Config file not uploaded/updated."
        fi

        # Check if config file already exists in the bucket
        if gsutil -q stat "gs://$bucket_name/$remote_blob_name"; then
          echo "Config file already exist. Proceeding with the update."
        else
          echo "Config file does not exist. Proceeding with the upload."
        fi
        
        # Upload or update the config file
        gsutil cp -a private "$local_config_path" "gs://$bucket_name/$remote_blob_name"
        
        echo "Config file uploaded/updated successfully in gs://$bucket_name/$remote_blob_name"
